server:
  entrypoints:
    web:
      address: ":8082"
  http:
    middlewares:
      auth:
        auth:
          database:
            dsn: postgres://postgres@localhost:5432/postgres?sslmode=disable
          encryption:
            key: test-encryption-key
      session:
        session:
          store:
            active: file
            file:
              session_key: "my_secret_key"
          options:
            http_only: true
            secure: false
            same_site: 2
          provider:
            # turna provider is backed by the in-process auth middleware;
            # no cert_url/token_url needed, tokens are validated and
            # refreshed directly against the "auth" middleware instance.
            turna:
              name: turna
              auth_middleware: "auth"
              password_flow: true
              passkey: true
              oauth2:
                client_id: "ui"
                client_secret: ""
                scopes:
                  - "openid"
          action:
            token:
              login_path: "/login/"
      login:
        login:
          path:
            base: "/login/"
          info:
            title: "Turna Login"
          session_middleware: "session"
      logout:
        set:
          values:
            - logout
      main:
        hello:
          headers:
            Content-Type: "text/html; charset=utf-8"
          message: |
            <!DOCTYPE html>
            <head><title>Turna</title></head>
            <body>
              <h1>Turna - Auth Test <a href="/logout/">Logout</a></h1>
            </body>
            </html>
    routers:
      login:
        path: /login/*
        middlewares:
          - login
      logout:
        path: /logout/*
        middlewares:
          - logout
          - login
      # the auth UI/API is protected by the session middleware which sets
      # X-User from the validated token claims.
      auth:
        path: /auth/*
        middlewares:
          - session
          - auth
      main:
        path: /*
        middlewares:
          - session
          - main
