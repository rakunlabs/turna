# HTTP isteklerini :9090 portundan alir ve docker unix socketine iletir.
#
# Docker daemon, /var/run/docker.sock uzerinden HTTP konusur. Bu yuzden L4
# (ham TCP) bir redirect yeterlidir: 9090'a gelen HTTP istekleri oldugu gibi
# sockete aktarilir.
#
# Ornek kullanim (turna calisirken):
#   curl http://localhost:9090/version
#   curl http://localhost:9090/containers/json
#
# UYARI: Docker socketi root yetkisine esittir. ip_allow_list ile sadece
# localhost'a izin verilmistir; disariya acmadan once dikkatli olun.
server:
  entrypoints:
    docker:
      address: ":9090"
  tcp:
    middlewares:
      ip:
        ip_allow_list:
          source_range:
            - 127.0.0.1/32   # IPv4 localhost
            - ::1/128        # IPv6 localhost ([::1])
      redirect:
        redirect:
          address: "/var/run/docker.sock"
          network: "unix"
    routers:
      docker:
        entrypoints:
          - docker
        middlewares:
          - ip
          - redirect
